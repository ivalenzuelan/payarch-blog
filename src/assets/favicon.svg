<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
  <style>
    .stroke-theme { stroke: #1a1814; }
    .fill-theme { fill: #1a1814; }
    @media (prefers-color-scheme: dark) {
      .stroke-theme { stroke: #faf9f6; }
      .fill-theme { fill: #faf9f6; }
    }
  </style>
  <g transform="translate(0, 8)">
    <path
      d="M 5 28 Q 26 3 47 28"
      class="stroke-theme"
      fill="none"
      stroke-width="2.5"
      stroke-linecap="round"
    />
    <circle cx="5" cy="28" r="3.5" class="fill-theme" />
    <circle cx="47" cy="28" r="3.5" class="fill-theme" />
    <circle cx="26" cy="15.5" r="3" fill="#7040c0" />
  </g>
</svg>
